name: Deploy to Render

on:
  push:
    branches: [ "main" ]

jobs:
  # ─── Step 1: Run tests & checks before deploying ───────────────────────────
  build-and-test:
    name: ✅ Build & Validate
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=moderate || true

      - name: Syntax check
        run: node --check app.js

  # ─── Step 2: Trigger Render deploy (only if build passes) ──────────────────
  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-test  # Only runs if build-and-test job passes

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          echo "Triggering deployment on Render..."
          curl -s -o response.txt -w "%{http_code}" \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" > http_code.txt
          
          HTTP_CODE=$(cat http_code.txt)
          echo "Response: $(cat response.txt)"
          echo "HTTP Status: $HTTP_CODE"
          
          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 201 ]; then
            echo "✅ Render deployment triggered successfully!"
          else
            echo "❌ Render deploy failed with status $HTTP_CODE"
            exit 1
          fi

      - name: Deployment summary
        run: |
          echo "================================================"
          echo "🎉 NamasteStay has been deployed to Render!"
          echo "🌐 Visit: https://namastestay.onrender.com"
          echo "================================================"
